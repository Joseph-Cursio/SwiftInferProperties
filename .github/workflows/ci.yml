name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-15
    steps:
      # SwiftInferProperties depends on SwiftProtocolLaws via a local path
      # (`../SwiftProtocolLaws`) during pre-1.0 development. Check both repos
      # out side-by-side so SPM can resolve the path dep.
      - name: Checkout SwiftInferProperties
        uses: actions/checkout@v6
        with:
          path: SwiftInferProperties
      - name: Checkout SwiftProtocolLaws
        uses: actions/checkout@v6
        with:
          repository: Joseph-Cursio/SwiftProtocolLaws
          ref: main
          path: SwiftProtocolLaws
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Run tests
        working-directory: SwiftInferProperties
        run: swift test --disable-experimental-prebuilts
